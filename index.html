<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halal Broilers | Admin Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="login-container">

    <div class="logo">
        <img src="images/logo.png" alt="Halal Broilers Logo">
    </div>

    <div class="company-details">
        <h1>HALAL BROILERS</h1>
        <p>Poultry Management System</p>
    </div>

    <div class="welcome-text">
        <h2>Welcome Back</h2>
        <p>Sign in to access your dashboard.</p>
    </div>

   <form id="loginForm">

    <div class="input-box">
        <label>Employee ID / Username</label>
        <input
            type="text"
            id="username"
            placeholder="Enter Employee ID">
    </div>

    <div class="input-box">
        <label>Password</label>
        <input
            type="password"
            id="password"
            placeholder="Enter Password">
    </div>

    <button
        id="loginBtn"
        type="submit">
        LOGIN
    </button>

</form>

    <div class="footer">
        © 2026 Halal Broilers. All Rights Reserved.
    </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<!-- Firebase Config -->
<script src="js/firebase-config.js"></script>

<!-- Main JS -->
<script src="js/script.js"></script>    -
</body>
</body>
</html>
